<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Chat — Our Legacy 2</title>
    <link rel="icon" href="/game_assets/game_title_our_legacy_2.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg-main); color: var(--text-light); font-family: 'Tiny5', monospace; }

        #chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 860px;
            margin: 0 auto;
            border-left: 2px solid var(--border);
            border-right: 2px solid var(--border);
        }

        #chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--wood-dark);
            border-bottom: 2px solid var(--border);
            flex-shrink: 0;
        }
        #chat-header .title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        #chat-header .back-link {
            font-size: 13px;
            color: var(--text-dim);
            text-decoration: none;
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: var(--bg-panel-dark);
            transition: color 0.15s, border-color 0.15s;
        }
        #chat-header .back-link:hover { color: var(--gold); border-color: var(--gold-dim); }

        #online-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            background: var(--bg-panel-dark);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #online-bar .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }
        #chat-users-inner-page { display: flex; flex-wrap: wrap; gap: 4px; }

        #chat-messages-page {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: var(--bg-main);
        }

        #chat-input-bar {
            padding: 10px 16px;
            border-top: 2px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
        }
        #chat-input-bar .row { display: flex; gap: 6px; align-items: center; }
        #chat-input-page {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg-panel-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            font-family: 'Tiny5', monospace;
            font-size: 14px;
            outline: none;
        }
        #chat-input-page:focus { border-color: var(--wood-bright); }
        #chat-send-page {
            padding: 8px 18px;
            background: var(--wood-dark);
            border: 2px solid var(--wood-bright);
            color: var(--gold-bright);
            font-family: 'Tiny5', monospace;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        #chat-send-page:hover { background: var(--wood-mid); }
        #chat-error-page { font-size: 12px; color: var(--red); min-height: 15px; margin-top: 5px; }
        #chat-cooldown-page { font-size: 12px; color: var(--text-dim); min-height: 15px; display: none; text-align: center; margin-top: 4px; }

        .glyph-btn-page {
            padding: 6px 8px;
            background: var(--slate-dark);
            border: 1px solid var(--border);
            color: var(--gold);
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
            flex-shrink: 0;
        }
        .glyph-btn-page:hover { background: var(--slate-mid); }

        #glyph-picker-page {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 5px;
            background: var(--bg-panel);
            border: 2px solid var(--border);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            padding: 10px;
            z-index: 20;
            width: 300px;
        }

        .user-pill {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--slate-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            text-decoration: none;
        }
        .user-pill:hover { border-color: var(--gold-dim); color: var(--gold); }
        .user-pill-me {
            background: rgba(96,136,88,0.25);
            border: 1px solid var(--green);
            color: var(--green-bright);
        }
        .user-pill-mod {
            background: rgba(120,90,30,0.3);
            border: 1px solid var(--gold-dim);
            color: var(--gold);
        }

        /* System message style */
        .msg-system {
            text-align: center;
            font-size: 11px;
            color: var(--gold-dim);
            padding: 3px 0;
            letter-spacing: 0.05em;
            font-style: italic;
        }

        /* Mod badge */
        .mod-badge {
            display: inline-block;
            font-size: 9px;
            background: rgba(120,90,20,0.5);
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            padding: 0 4px;
            margin-left: 4px;
            vertical-align: middle;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Emote message style */
        .msg-emote-text { color: var(--text-dim); font-style: italic; }

        /* Mod command hint bar */
        #mod-hint-bar {
            display: none;
            font-size: 10px;
            color: var(--text-dim);
            padding: 3px 16px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--border);
            letter-spacing: 0.04em;
        }

        /* Owner command hint bar */
        #owner-hint-bar {
            display: none;
            font-size: 10px;
            color: var(--gold-dim);
            padding: 3px 16px;
            background: rgba(60,40,0,0.4);
            border-top: 1px solid var(--gold-dim);
            letter-spacing: 0.04em;
        }

        .owner-badge, .mod-badge {
            display: inline-flex;
            align-items: center;
            margin-left: 5px;
            vertical-align: middle;
        }
        .owner-badge img, .mod-badge img {
            width: 14px;
            height: 14px;
            image-rendering: pixelated;
        }

        /* ── Admin Terminal Panel ── */
        #admin-terminal-panel {
            display: none;
            flex-direction: column;
            background: #060709;
            border-bottom: 2px solid #1a2535;
            flex-shrink: 0;
            max-height: 220px;
        }
        #admin-terminal-panel.visible { display: flex; }
        .adm-panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: #0c1018;
            border-bottom: 1px solid #1a2535;
            cursor: url('/game_assets/UI/cursor/2.%20Hand%20Pointer.png') 0 0, pointer;
            user-select: none;
            flex-shrink: 0;
        }
        .adm-panel-header img { width: 14px; height: 14px; image-rendering: pixelated; }
        .adm-panel-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #3b82f6;
            flex: 1;
        }
        .adm-panel-toggle {
            font-size: 10px;
            color: #4b5563;
        }
        #admin-terminal-out {
            flex: 1;
            overflow-y: auto;
            padding: 6px 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-height: 60px;
        }
        .adm-pl { line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .adm-pl.ok   { color: #22c55e; }
        .adm-pl.err  { color: #ef4444; }
        .adm-pl.warn { color: #f59e0b; }
        .adm-pl.info { color: #60a5fa; }
        .adm-pl.dim  { color: #4b5563; }
        .adm-pl.cmd  { color: #f59e0b; }
        .adm-pl.head { color: #3b82f6; font-weight: 700; }
        #admin-terminal-input-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px 6px;
            border-top: 1px solid #1a2535;
            background: #0c1018;
            flex-shrink: 0;
        }
        .adm-prompt-lbl { color: #f59e0b; font-size: 11px; font-family: 'Courier New', monospace; user-select: none; }
        #admin-terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            caret-color: #22c55e;
        }
        .adm-run-btn-sm {
            background: rgba(34,197,94,0.1);
            border: 1px solid #16a34a;
            color: #22c55e;
            padding: 2px 8px;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            cursor: url('/game_assets/UI/cursor/2.%20Hand%20Pointer.png') 0 0, pointer;
        }
        .adm-run-btn-sm:hover { background: rgba(34,197,94,0.2); }

        .user-pill-owner {
            background: rgba(80,55,0,0.5);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
        }

        /* Hide entire header bar when inside iframe (overlay has its own header) */
        body.in-iframe #chat-header { display: none; }
    </style>
</head>
<body>
<div id="chat-page">

    <div id="chat-header">
        <div class="title">
            <img src="/game_assets/glyphs/chat.png" alt="chat" style="width:24px;height:24px;image-rendering:pixelated;">
            Global Chat
        </div>
        <div style="display:flex;gap:6px;">
            <a class="back-link" href="/friends">Friends</a>
            <a class="back-link" href="/game">&#8592; Game</a>
        </div>
    </div>

    <div id="online-bar">
        <span class="label">Online:</span>
        <div id="chat-users-inner-page"></div>
    </div>

    <!-- Admin Terminal Panel (owner/mod only) -->
    <div id="admin-terminal-panel">
        <div class="adm-panel-header" onclick="toggleAdminTerminal()">
            <img src="/game_assets/glyphs/terminal.png" alt="terminal">
            <span class="adm-panel-label">Admin Terminal</span>
            <span class="adm-panel-toggle" id="adm-toggle-icon">▾</span>
        </div>
        <div id="admin-terminal-body" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
            <div id="admin-terminal-out"></div>
            <div id="admin-terminal-input-row">
                <span class="adm-prompt-lbl">root@ol2 &gt;</span>
                <input id="admin-terminal-input" type="text" placeholder="Command..." autocomplete="off" spellcheck="false">
                <button class="adm-run-btn-sm" onclick="runAdminCmd()">Run</button>
            </div>
        </div>
    </div>

    <div id="chat-messages-page">
        <div style="text-align:center;font-size:12px;color:var(--text-dim);padding:30px 0;" id="chat-loading-page">Connecting...</div>
    </div>

    <div id="mod-hint-bar">
        Mod commands: /mute /unmute /ban /unban /warn /clearwarn /kick /announce &mdash; type /help for full list
    </div>
    <div id="owner-hint-bar">
        Owner commands: /addmod /removemod /setowner /clearall /listbans /listmutes &mdash; type /help for full list
    </div>

    <div id="chat-input-bar" style="position:relative;">
        <div id="glyph-picker-page">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:7px;">Insert Glyph</div>
            <div id="glyph-picker-grid" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
        </div>
        <div class="row">
            <button onclick="toggleGlyphPicker()" title="Insert glyph" class="glyph-btn-page">+</button>
            <input id="chat-input-page" type="text" maxlength="200"
                placeholder="Message the realm... (/help for commands, :warrior: for glyphs)"
                autocomplete="off"
                onkeydown="if(event.key==='Enter')chatSend()">
            <button id="chat-send-page" onclick="chatSend()">Send</button>
        </div>
        <div id="chat-error-page"></div>
        <div id="chat-cooldown-page"></div>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
    var CURRENT_USER = {{ online_username | tojson }};
    var IS_MOD = false;
    var IS_OWNER = false;
    var MOD_LIST = [];
    var OWNER_NAME = '';
    var socket = null;
    var cooldownTimer = null;

    function initChat() {
        socket = io({ transports: ['polling', 'websocket'] });

        socket.on('connect', function() {
            var l = document.getElementById('chat-loading-page');
            if (l) l.remove();
        });

        socket.on('user_flags', function(flags) {
            IS_MOD = !!flags.is_mod;
            IS_OWNER = !!flags.is_owner;
            var ownerBar = document.getElementById('owner-hint-bar');
            if (ownerBar) ownerBar.style.display = IS_OWNER ? 'block' : 'none';
            var panel = document.getElementById('admin-terminal-panel');
            if (panel && (IS_OWNER || IS_MOD)) panel.classList.add('visible');
        });

        socket.on('owner_name', function(name) {
            OWNER_NAME = (name || '').toLowerCase();
            renderOnlineBar(_lastOnlineUsers);
        });

        socket.on('chat_cleared', function() {
            var box = document.getElementById('chat-messages-page');
            if (box) box.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:30px 0;">Chat has been cleared.</div>';
        });

        socket.on('mod_list', function(mods) {
            MOD_LIST = mods || [];
            IS_MOD = CURRENT_USER && MOD_LIST.indexOf(CURRENT_USER.toLowerCase()) !== -1;
            var bar = document.getElementById('mod-hint-bar');
            if (bar) bar.style.display = IS_MOD ? 'block' : 'none';
            renderOnlineBar(_lastOnlineUsers);
        });

        socket.on('chat_history', function(msgs) {
            var box = document.getElementById('chat-messages-page');
            if (!box) return;
            box.innerHTML = '';
            if (!msgs || !msgs.length) {
                box.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:30px 0;">No messages yet. Be the first!</div>';
                return;
            }
            msgs.forEach(function(m) { appendMessage(m, false); });
            box.scrollTop = box.scrollHeight;
        });

        socket.on('chat_message', function(msg) {
            appendMessage(msg, true);
        });

        socket.on('online_users', function(users) {
            _lastOnlineUsers = users || [];
            renderOnlineBar(_lastOnlineUsers);
        });

        socket.on('chat_error', function(data) {
            var el = document.getElementById('chat-error-page');
            if (!el) return;
            el.textContent = data.message || 'Error.';
            if (data.message && data.message.match(/wait \d+s/i)) {
                startCooldownDisplay(data.message);
            }
            setTimeout(function() { if (el) el.textContent = ''; }, 5000);
        });
    }

    var _lastOnlineUsers = [];

    function renderOnlineBar(users) {
        var innerEl = document.getElementById('chat-users-inner-page');
        if (!innerEl) return;
        innerEl.innerHTML = users.map(function(u) {
            var isMe = (u === CURRENT_USER);
            var isOwner = OWNER_NAME && u.toLowerCase() === OWNER_NAME;
            var isMod = !isOwner && MOD_LIST.indexOf(u.toLowerCase()) !== -1;
            var badge = isOwner
                ? '<img src="/game_assets/glyphs/owner.png" style="width:11px;height:11px;vertical-align:middle;margin-left:3px;image-rendering:pixelated;" alt="owner" title="Owner">'
                : (isMod ? '<img src="/game_assets/glyphs/admin.png" style="width:11px;height:11px;vertical-align:middle;margin-left:3px;image-rendering:pixelated;" alt="mod" title="Moderator">' : '');
            var pillClass = 'user-pill' + (isOwner ? ' user-pill-owner' : (isMod ? ' user-pill-mod' : (isMe ? ' user-pill-me' : '')));
            if (isMe) {
                return '<span class="' + pillClass + '">' + escHtml(u) + badge + ' (you)</span>';
            }
            return '<a href="/friends?dm=' + encodeURIComponent(u) + '" title="Message ' + escHtml(u) + '" class="' + pillClass + '">' + escHtml(u) + badge + '</a>';
        }).join('');
    }

    function appendMessage(msg, animate) {
        var box = document.getElementById('chat-messages-page');
        if (!box) return;

        // System messages
        if (msg.is_system || msg.username === 'SYSTEM') {
            var sysDiv = document.createElement('div');
            sysDiv.className = 'msg-system';
            sysDiv.textContent = msg.message;
            if (animate) sysDiv.style.opacity = '0';
            box.appendChild(sysDiv);
            box.scrollTop = box.scrollHeight;
            if (animate) setTimeout(function() { sysDiv.style.transition = 'opacity 0.2s'; sysDiv.style.opacity = '1'; }, 10);
            return;
        }

        var isMe = (msg.username === CURRENT_USER);
        var isOwnerMsg = OWNER_NAME && (msg.username || '').toLowerCase() === OWNER_NAME;
        var isMod = !isOwnerMsg && (msg.is_mod || MOD_LIST.indexOf((msg.username || '').toLowerCase()) !== -1);
        var isEmote = msg.is_emote;

        var div = document.createElement('div');
        div.style.cssText = 'display:flex;flex-direction:column;' + (isEmote ? 'align-items:center;' : isMe ? 'align-items:flex-end;' : 'align-items:flex-start;');

        var time = '';
        if (msg.created_at) {
            try {
                var d = new Date(msg.created_at);
                time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            } catch(e) {}
        }

        if (isEmote) {
            div.innerHTML =
                '<div style="font-size:12px;color:var(--text-dim);font-style:italic;padding:2px 0;">' +
                escHtml(msg.message) + '</div>';
        } else {
            var bubbleBg = isMe ? 'var(--wood-dark)' : (isOwnerMsg ? 'rgba(60,40,0,0.5)' : (isMod ? 'rgba(80,55,10,0.4)' : 'var(--bg-panel)'));
            var bubbleBorder = isMe ? 'var(--wood-bright)' : (isOwnerMsg ? 'var(--gold)' : (isMod ? 'var(--gold-dim)' : 'var(--border)'));
            var nameColor = isMe ? 'var(--gold-bright)' : 'var(--gold)';
            var roleBadgeHtml = isOwnerMsg
                ? '<span class="owner-badge"><img src="/game_assets/glyphs/owner.png" alt="owner" title="Owner"></span>'
                : (isMod ? '<span class="mod-badge"><img src="/game_assets/glyphs/admin.png" alt="mod" title="Moderator"></span>' : '');
            div.innerHTML =
                '<div style="max-width:560px;padding:6px 12px;background:' + bubbleBg +
                ';border:1px solid ' + bubbleBorder + ';word-break:break-word;">' +
                '<span style="font-size:11px;font-weight:700;color:' + nameColor + ';text-transform:uppercase;letter-spacing:0.05em;">' +
                escHtml(msg.username) + '</span>' + roleBadgeHtml +
                '<div style="font-size:13px;color:var(--text-light);margin-top:2px;">' + renderMsg(msg.message) + '</div>' +
                (time ? '<div style="font-size:10px;color:var(--text-dim);margin-top:2px;text-align:right;">' + time + '</div>' : '') +
                '</div>';
        }

        if (animate) div.style.opacity = '0';
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (animate) {
            setTimeout(function() { div.style.transition = 'opacity 0.2s'; div.style.opacity = '1'; }, 10);
        }
    }

    function startCooldownDisplay(msg) {
        var cd = document.getElementById('chat-cooldown-page');
        var inp = document.getElementById('chat-input-page');
        if (!cd) return;
        var match = msg.match(/(\d+)s/);
        var secs = match ? parseInt(match[1]) : 10;
        cd.style.display = 'block';
        if (inp) inp.disabled = true;
        var interval = setInterval(function() {
            secs--;
            if (secs <= 0) {
                clearInterval(interval);
                cd.style.display = 'none';
                cd.textContent = '';
                if (inp) inp.disabled = false;
            } else {
                cd.textContent = 'Next message in ' + secs + 's';
            }
        }, 1000);
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    var GLYPHS = {
        'warrior':'warrior.png','mage':'mage.png','rogue':'rouge.png','rouge':'rouge.png',
        'hunter':'hunter.png','bard':'bard.png','paladin':'paladin.png','druid':'druid.png',
        'priest':'priest.png','hp':'hp.png','mana':'mana.png','gold':'gold.png',
        'exp':'exp.png','level':'level.gif','weapon':'weapon.png','armor':'armor.png',
        'offhand':'offhand.png','accessories':'accessories.png','book':'book.png',
        'food':'food.png','materials':'materials.png','spell':'spell.png',
        'chat':'chat.png','settings':'settings.png','sparkles':'sparkles.png',
        'fight':'fight.png','day':'time_day.png','night':'time_night.png',
        'male':'male.png','female':'female.png','non_binary':'non_binary.png',
        'pickaxe':'pickaxe.png'
    };

    function renderMsg(text) {
        var parts = text.split(/:([a-z_]+):/);
        var out = '';
        for (var i = 0; i < parts.length; i++) {
            if (i % 2 === 0) {
                out += escHtml(parts[i]);
            } else {
                var key = parts[i];
                if (GLYPHS[key]) {
                    out += '<img src="/game_assets/glyphs/' + GLYPHS[key] + '" alt=":' + key + ':" title=":' + key + ':" style="width:20px;height:20px;vertical-align:middle;image-rendering:pixelated;margin:0 2px;">';
                } else {
                    out += escHtml(':' + key + ':');
                }
            }
        }
        return out;
    }

    function buildGlyphPicker() {
        var grid = document.getElementById('glyph-picker-grid');
        if (!grid || grid.dataset.built) return;
        grid.dataset.built = '1';
        var seen = {};
        Object.keys(GLYPHS).forEach(function(key) {
            var file = GLYPHS[key];
            if (seen[file]) return;
            seen[file] = true;
            var btn = document.createElement('button');
            btn.title = ':' + key + ':';
            btn.style.cssText = 'background:var(--slate-dark);border:1px solid var(--border);padding:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;';
            btn.innerHTML = '<img src="/game_assets/glyphs/' + file + '" style="width:20px;height:20px;image-rendering:pixelated;" alt=":' + key + ':">';
            btn.addEventListener('click', function() {
                var inp = document.getElementById('chat-input-page');
                if (!inp) return;
                var code = ':' + key + ':';
                var pos = inp.selectionStart;
                inp.value = inp.value.slice(0, pos) + code + inp.value.slice(inp.selectionEnd);
                inp.selectionStart = inp.selectionEnd = pos + code.length;
                inp.focus();
                document.getElementById('glyph-picker-page').style.display = 'none';
            });
            grid.appendChild(btn);
        });
    }

    window.toggleGlyphPicker = function() {
        var picker = document.getElementById('glyph-picker-page');
        if (!picker) return;
        var open = picker.style.display !== 'none';
        picker.style.display = open ? 'none' : 'block';
        if (!open) buildGlyphPicker();
    };

    document.addEventListener('click', function(e) {
        var picker = document.getElementById('glyph-picker-page');
        if (!picker || picker.style.display === 'none') return;
        if (!picker.contains(e.target) && !e.target.closest('.glyph-btn-page')) {
            picker.style.display = 'none';
        }
    });

    window.chatSend = function() {
        if (!socket) return;
        var inp = document.getElementById('chat-input-page');
        if (!inp) return;
        var msg = inp.value.trim();
        if (!msg) return;
        socket.emit('chat_send', { message: msg });
        inp.value = '';
    };

    document.addEventListener('DOMContentLoaded', function() {
        if (window.self !== window.top) {
            document.body.classList.add('in-iframe');
        }
        initChat();
        var inp = document.getElementById('chat-input-page');
        if (inp) inp.focus();

        var ti = document.getElementById('admin-terminal-input');
        if (ti) ti.addEventListener('keydown', function(e) { if (e.key === 'Enter') runAdminCmd(); });
    });

    // ── Admin Terminal ──────────────────────────────────────────────
    var _admTermOpen = true;
    var _admHistory = [], _admHistIdx = -1;

    window.toggleAdminTerminal = function() {
        var body = document.getElementById('admin-terminal-body');
        var icon = document.getElementById('adm-toggle-icon');
        _admTermOpen = !_admTermOpen;
        if (body) body.style.display = _admTermOpen ? 'flex' : 'none';
        if (icon) icon.textContent = _admTermOpen ? '▾' : '▸';
    };

    function admPrint(text, cls) {
        var out = document.getElementById('admin-terminal-out');
        if (!out) return;
        var d = document.createElement('div');
        d.className = 'adm-pl' + (cls ? ' ' + cls : '');
        d.textContent = text;
        out.appendChild(d);
        out.scrollTop = out.scrollHeight;
    }

    async function admApi(method, endpoint, body) {
        var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        var r = await fetch(endpoint, opts);
        return r.json();
    }

    window.runAdminCmd = async function() {
        var inp = document.getElementById('admin-terminal-input');
        if (!inp) return;
        var raw = inp.value.trim();
        if (!raw) return;
        inp.value = '';
        _admHistory.unshift(raw);
        _admHistIdx = -1;
        if (_admHistory.length > 40) _admHistory.pop();
        admPrint('> ' + raw, 'cmd');
        var parts = raw.split(/\s+/);
        var cmd = parts[0].toLowerCase();
        try {
            switch (cmd) {
                case 'help':
                    admPrint('Server: ban unban kick mute unmute warn addmod removemod online', 'info');
                    admPrint('Char:   stats inventory heal  give gold/xp/item/mxp  set level/stat/mining  remove item', 'info');
                    break;
                case 'clear':
                    document.getElementById('admin-terminal-out').innerHTML = '';
                    break;
                case 'stats': {
                    var d = await admApi('GET', '/api/admin/game/stats');
                    if (!d.ok) { admPrint(d.message, 'err'); break; }
                    admPrint(d.name + ' (' + d.class + ')  Lv' + d.level + ' [' + d.rank + ']  ' + d.hp + '/' + d.max_hp + 'HP  ' + d.gold + 'g  Mining:' + d.mining_level, 'info');
                    admPrint('ATK:' + d.attack + '  DEF:' + d.defense + '  SPD:' + d.speed + '  EXP:' + d.experience + '/' + d.experience_to_next + '  Inv:' + d.inventory_count, 'dim');
                    break;
                }
                case 'inventory': {
                    var d = await admApi('GET', '/api/admin/game/inventory');
                    if (!d.ok) { admPrint(d.message, 'err'); break; }
                    var entries = Object.entries(d.inventory);
                    if (!entries.length) { admPrint('(empty)  Gold: ' + d.gold + 'g', 'dim'); break; }
                    admPrint('Inventory (' + entries.length + ' types, ' + d.gold + 'g):', 'head');
                    entries.sort(function(a,b){return a[0].localeCompare(b[0]);}).forEach(function(e){
                        admPrint('  ' + (e[1] > 1 ? e[1] + 'x ' : '   ') + e[0], 'dim');
                    });
                    break;
                }
                case 'heal': {
                    var r = await admApi('POST', '/api/admin/game/heal');
                    admPrint(r.message, r.ok ? 'ok' : 'err');
                    break;
                }
                case 'give': {
                    var sub = (parts[1] || '').toLowerCase();
                    if (sub === 'gold' || sub === 'xp' || sub === 'mxp') {
                        var kind = sub === 'mxp' ? 'mining_xp' : sub;
                        var n = parseInt(parts[2]);
                        if (!n || n <= 0) { admPrint('Usage: give ' + sub + ' <amount>', 'warn'); break; }
                        var r = await admApi('POST', '/api/admin/game/give', { kind: kind, amount: n });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else if (sub === 'item') {
                        var lastP = parts[parts.length - 1];
                        var hasQty = /^\d+$/.test(lastP) && parts.length > 3;
                        var qty = hasQty ? parseInt(lastP) : 1;
                        var itemName = (hasQty ? parts.slice(2, -1) : parts.slice(2)).join(' ');
                        if (!itemName) { admPrint('Usage: give item <name> [qty]', 'warn'); break; }
                        var r = await admApi('POST', '/api/admin/game/give', { kind: 'item', item: itemName, qty: qty });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else { admPrint('Usage: give gold|xp|mxp|item <value>', 'warn'); }
                    break;
                }
                case 'set': {
                    var sub = (parts[1] || '').toLowerCase();
                    if (sub === 'level') {
                        var n = parseInt(parts[2]);
                        var r = await admApi('POST', '/api/admin/game/set', { kind: 'level', value: n });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else if (sub === 'stat') {
                        var r = await admApi('POST', '/api/admin/game/set', { kind: 'stat', stat: parts[2], value: parseInt(parts[3]) });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else if (sub === 'mining') {
                        var r = await admApi('POST', '/api/admin/game/set', { kind: 'mining_level', value: parseInt(parts[2]) });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else { admPrint('Usage: set level|stat|mining <value>', 'warn'); }
                    break;
                }
                case 'remove': {
                    if ((parts[1]||'').toLowerCase() === 'item') {
                        var lastP = parts[parts.length - 1];
                        var hasQty = /^\d+$/.test(lastP) && parts.length > 3;
                        var qty = hasQty ? parseInt(lastP) : 1;
                        var itemName = (hasQty ? parts.slice(2, -1) : parts.slice(2)).join(' ');
                        var r = await admApi('POST', '/api/admin/game/remove', { item: itemName, qty: qty });
                        admPrint(r.message, r.ok ? 'ok' : 'err');
                    } else { admPrint('Usage: remove item <name> [qty]', 'warn'); }
                    break;
                }
                case 'ban': { var r = await admApi('POST', '/api/admin/ban', { username: parts[1], reason: parts.slice(2).join(' ') || 'No reason.' }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'unban': { var r = await admApi('POST', '/api/admin/unban', { username: parts[1] }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'kick': { var r = await admApi('POST', '/api/admin/kick', { username: parts[1] }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'mute': {
                    var hasMin = parts[2] && /^\d+$/.test(parts[2]);
                    var r = await admApi('POST', '/api/admin/mute', { username: parts[1], duration_minutes: hasMin ? parseInt(parts[2]) : null, reason: parts.slice(hasMin ? 3 : 2).join(' ') || 'No reason.' });
                    admPrint(r.message, r.ok ? 'ok' : 'err'); break;
                }
                case 'unmute': { var r = await admApi('POST', '/api/admin/unmute', { username: parts[1] }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'warn': { var r = await admApi('POST', '/api/admin/warn', { username: parts[1], reason: parts.slice(2).join(' ') || 'No reason.' }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'addmod': { var r = await admApi('POST', '/api/admin/add_admin', { username: parts[1] }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'removemod': { var r = await admApi('POST', '/api/admin/remove_admin', { username: parts[1] }); admPrint(r.message, r.ok ? 'ok' : 'err'); break; }
                case 'online': {
                    var d = await admApi('GET', '/api/admin/data');
                    if (!d.ok) { admPrint(d.message, 'err'); break; }
                    admPrint('Online (' + d.online_count + '): ' + (d.online_users.join(', ') || 'none'), 'info');
                    break;
                }
                default:
                    admPrint('Unknown: ' + cmd + '  (type help)', 'err');
            }
        } catch(e) { admPrint('Error: ' + e.message, 'err'); }
    };
})();
</script>
</body>
</html>
