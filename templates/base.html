<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Legacy 2</title>
    <link rel="icon" href="/game_assets/game_title_our_legacy_2.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Background music (loops; volume controlled by user) -->
    <audio id="bg-music" loop preload="auto" style="display:none;">
        <source src="/game_assets/music/main_theme_1.mp3" type="audio/mpeg">
    </audio>

    {% block content %}{% endblock %}
    <script src="/static/js/game.js"></script>
    {% block extra_scripts %}{% endblock %}

    <!-- Custom Confirm Modal -->
    <div id="game-confirm-overlay" style="display:none;position:fixed;inset:0;width:100%;height:100%;min-height:100vh;background:rgba(0,0,0,0.82);z-index:10000;align-items:center;justify-content:center;overflow:hidden;" onclick="event.stopPropagation()">
        <div style="background:linear-gradient(160deg,rgba(20,12,40,0.99),rgba(10,6,24,0.99));border:1px solid rgba(180,130,255,0.45);border-radius:12px;padding:28px 28px 22px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(60,20,120,0.55);text-align:center;">
            <div style="font-size:28px;margin-bottom:12px;">&#9888;&#65039;</div>
            <div id="game-confirm-msg" style="font-size:14px;color:var(--text-light);margin-bottom:22px;line-height:1.6;"></div>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button id="game-confirm-ok" class="btn btn-danger" style="min-width:100px;">Confirm</button>
                <button id="game-confirm-cancel" class="btn btn-secondary" style="min-width:100px;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal (available on all pages) -->
    <div id="settings-modal" class="settings-overlay" style="display:none;" onclick="settingsOverlayClick(event)">
        <div class="settings-panel panel">
            <div class="panel-title">Settings</div>
            <div class="panel-body settings-body">
                <div class="settings-section-label">Audio</div>
                <div class="settings-row">
                    <span class="settings-label">Music</span>
                    <button id="settings-music-toggle" class="btn btn-secondary btn-xsmall" onclick="settingsToggleMusic()">On</button>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Volume</span>
                    <input type="range" id="settings-music-slider" min="0" max="100" value="30"
                           oninput="settingsSetVolume(this.value)" class="music-slider">
                    <span id="settings-music-vol" class="music-vol-label">30%</span>
                </div>
                <div class="settings-section-label" style="margin-top:8px;">Background</div>
                <div class="settings-row settings-bg-row">
                    <button class="bg-option-btn btn btn-secondary btn-xsmall" data-bg="1" onclick="applyBackground('1')">BG 1</button>
                    <button class="bg-option-btn btn btn-secondary btn-xsmall" data-bg="2" onclick="applyBackground('2')">BG 2</button>
                    <button class="bg-option-btn btn btn-secondary btn-xsmall" data-bg="3" onclick="applyBackground('3')">BG 3</button>
                    <button class="bg-option-btn btn btn-secondary btn-xsmall" data-bg="4" onclick="applyBackground('4')">BG 4</button>
                    <button class="bg-option-btn btn btn-secondary btn-xsmall" data-bg="none" onclick="applyBackground('none')">None</button>
                </div>
                <div class="settings-section-label" style="margin-top:8px;">Display</div>
                <div class="settings-row">
                    <span class="settings-label">Fullscreen</span>
                    <button id="settings-fs-btn" class="btn btn-secondary btn-xsmall" onclick="settingsToggleFullscreen()">Go Fullscreen</button>
                </div>
            </div>
            <div class="settings-footer">
                <button class="btn btn-secondary btn-small" onclick="closeSettings()">Close</button>
            </div>
        </div>
    </div>

    <!-- ── Global Chat Widget + Groups Widget (online users only) ─── -->
    {% if online_username %}
    <style>
        /* Chat widget FAB and panel are hidden everywhere — global chat lives only at /chat */
        #chat-toggle-btn { display: none !important; }
        #chat-panel { display: none !important; }
        /* Groups FAB and overlay hidden — Adventure Group is accessed via /groups */
        #chat-widget .widget-fab { display: none !important; }
        #groups-overlay { display: none !important; }

        #chat-panel {
            position: relative;
            min-width: 260px;
            min-height: 220px;
        }
        #chat-resize-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            cursor: ns-resize;
            background: transparent;
            z-index: 10;
        }
        #chat-resize-handle:hover { background: rgba(120,80,40,0.3); }
        #chat-resize-lr {
            position: absolute;
            top: 5px;
            bottom: 0;
            left: 0;
            width: 5px;
            cursor: ew-resize;
            background: transparent;
            z-index: 10;
        }
        #chat-resize-lr:hover { background: rgba(120,80,40,0.25); }

        .widget-fab {
            width: 46px;
            height: 46px;
            background: var(--wood-dark);
            border: 2px solid var(--wood-bright);
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Tiny5', monospace;
            transition: background 0.15s;
        }
        .widget-fab:hover { background: var(--wood-mid); }

        #groups-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 8500;
            background: rgba(0,0,0,0.75);
            align-items: center;
            justify-content: center;
        }
        #groups-overlay-panel {
            width: min(980px, 96vw);
            height: min(700px, 92vh);
            background: var(--bg-panel);
            border: 2px solid var(--border);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #groups-overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 14px;
            background: var(--wood-dark);
            border-bottom: 2px solid var(--border);
            flex-shrink: 0;
        }
        #groups-overlay iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--bg-main);
        }
    </style>

    <!-- Groups Overlay Modal -->
    <div id="groups-overlay" onclick="if(event.target===this)closeGroupsOverlay()">
        <div id="groups-overlay-panel">
            <div id="groups-overlay-header">
                <span style="font-size:13px;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;">&#9876; Adventure Group</span>
                <button onclick="closeGroupsOverlay()" style="background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;padding:0;" title="Close">&times;</button>
            </div>
            <iframe id="groups-overlay-frame" src="" title="Adventure Group"></iframe>
        </div>
    </div>

    <div id="chat-widget" style="position:fixed;bottom:20px;right:20px;z-index:8000;display:flex;flex-direction:column;align-items:flex-end;gap:8px;">

        <!-- Chat Panel (iframe-based) -->
        <div id="chat-panel" style="display:none;width:320px;height:480px;background:var(--bg-panel);border:2px solid var(--border);box-shadow:4px 4px 0 rgba(0,0,0,0.5);overflow:hidden;flex-direction:column;margin-bottom:0;">

            <!-- Resize handles -->
            <div id="chat-resize-handle" title="Drag to resize"></div>
            <div id="chat-resize-lr" title="Drag to resize"></div>

            <!-- Header -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--wood-dark);border-bottom:2px solid var(--border);flex-shrink:0;">
                <span style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:0.07em;text-transform:uppercase;display:flex;align-items:center;gap:5px;"><img src="/game_assets/glyphs/chat.png" alt="chat" style="width:22px;height:22px;image-rendering:pixelated;"> Global Chat</span>
                <div style="display:flex;gap:5px;align-items:center;">
                    <a href="/chat" target="_blank" title="Open full chat" style="background:var(--bg-panel-dark);border:1px solid var(--border);color:var(--text-dim);font-size:13px;cursor:pointer;padding:2px 5px;text-decoration:none;line-height:1;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">&#8599;</a>
                    <button onclick="toggleChat()" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1;padding:0;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">&times;</button>
                </div>
            </div>

            <!-- Chat iframe -->
            <iframe id="chat-widget-frame" src="" title="Global Chat" style="flex:1;width:100%;border:none;background:var(--bg-main);"></iframe>
        </div>

        <!-- Groups FAB -->
        <button class="widget-fab" onclick="openGroupsOverlay()" title="Adventure Group">&#9876;
            <span id="groups-badge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--bg-main);width:14px;height:14px;font-size:9px;line-height:14px;text-align:center;font-weight:700;"></span>
        </button>

        <!-- Chat FAB -->
        <button class="widget-fab" id="chat-toggle-btn" onclick="toggleChat()" title="Global Chat">
            <img src="/game_assets/glyphs/chat.png" alt="chat" style="width:22px;height:22px;image-rendering:pixelated;">
            <span id="chat-badge" style="display:none;position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;width:15px;height:15px;font-size:9px;line-height:15px;text-align:center;font-weight:700;"></span>
        </button>
    </div>

    <!-- Trade Panel Modal -->
    <div id="trade-overlay" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.78);align-items:center;justify-content:center;">
        <div id="trade-panel" style="background:var(--bg-panel);border:2px solid var(--border);box-shadow:4px 4px 0 rgba(0,0,0,0.6);width:min(700px,96vw);max-height:90vh;overflow-y:auto;">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:2px solid var(--border);background:var(--wood-dark);">
                <span id="trade-title" style="font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.07em;text-transform:uppercase;">&#8644; Trade</span>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span id="trade-status-label" style="font-size:11px;color:var(--text-dim);"></span>
                    <button id="trade-cancel-btn" onclick="tradeCancel()" style="padding:4px 10px;background:var(--red-dark);border:1px solid var(--red);color:#f8c0a0;font-size:12px;cursor:pointer;font-family:'Tiny5',monospace;">Cancel</button>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:320px;">
                <!-- My offer -->
                <div style="padding:14px 16px;border-right:1px solid var(--border);">
                    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:10px;">Your Offer</div>
                    <div id="trade-my-items" style="min-height:80px;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;"></div>
                    <div style="display:flex;gap:6px;align-items:center;margin-bottom:8px;">
                        <button onclick="tradeOpenItemPicker()" id="trade-add-item-btn" style="flex:1;padding:6px 10px;background:var(--slate-dark);border:1px solid var(--border);color:var(--text-light);font-size:11px;cursor:pointer;font-family:'Tiny5',monospace;">+ Add Item</button>
                    </div>
                    <div style="display:flex;gap:6px;align-items:center;">
                        <input id="trade-gold-input" type="number" min="0" placeholder="Gold to offer" style="flex:1;padding:6px 8px;background:var(--bg-panel-dark);border:1px solid var(--border);color:var(--gold);font-size:12px;outline:none;font-family:'Tiny5',monospace;" oninput="tradeSetGold(this.value)">
                        <img src="/game_assets/glyphs/gold.png" alt="gold" style="width:18px;height:18px;image-rendering:pixelated;">
                    </div>
                    <div id="trade-my-gold-label" style="font-size:10px;color:var(--text-dim);margin-top:4px;"></div>
                </div>
                <!-- Their offer -->
                <div style="padding:14px 16px;">
                    <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:10px;">Their Offer</div>
                    <div id="trade-their-items" style="min-height:80px;display:flex;flex-direction:column;gap:4px;margin-bottom:10px;"></div>
                    <div id="trade-their-gold" style="font-size:12px;color:var(--gold);margin-top:4px;"></div>
                </div>
            </div>
            <!-- Confirm bar -->
            <div style="padding:10px 16px;border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg-panel-dark);">
                <div id="trade-error-label" style="font-size:11px;color:var(--red);flex:1;"></div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span id="trade-their-confirm-label" style="font-size:11px;color:var(--text-dim);"></span>
                    <button id="trade-confirm-btn" onclick="tradeToggleConfirm()" style="padding:7px 18px;background:var(--green);border:2px solid var(--green-bright);color:var(--gold-bright);font-size:13px;font-weight:700;cursor:pointer;font-family:'Tiny5',monospace;text-transform:uppercase;">Confirm Trade</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Item Picker Modal -->
    <div id="trade-item-picker" style="display:none;position:fixed;inset:0;z-index:9500;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;" onclick="if(event.target===this)this.style.display='none'">
        <div style="background:var(--bg-panel);border:2px solid var(--border);box-shadow:4px 4px 0 rgba(0,0,0,0.5);width:min(440px,94vw);max-height:80vh;overflow-y:auto;padding:16px;">
            <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:0.06em;">Choose Item to Offer <button onclick="document.getElementById('trade-item-picker').style.display='none'" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;">&times;</button></div>
            <input id="trade-item-search" type="text" placeholder="Search items..." style="width:100%;box-sizing:border-box;padding:7px 10px;background:var(--bg-panel-dark);border:1px solid var(--border);color:var(--text-light);font-size:12px;outline:none;margin-bottom:10px;font-family:'Tiny5',monospace;" oninput="tradeFilterItems(this.value)">
            <div id="trade-item-list" style="display:flex;flex-direction:column;gap:4px;"></div>
        </div>
    </div>

    <!-- Auto-save indicator -->
    <div id="autosave-indicator" style="display:none;position:fixed;bottom:82px;right:20px;z-index:7500;font-size:11px;color:var(--green-bright);background:var(--bg-panel);border:1px solid var(--green);padding:3px 9px;pointer-events:none;font-family:'Tiny5',monospace;"></div>

    <!-- SocketIO client -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
    (function() {
        var CURRENT_USER = {{ online_username | tojson }};
        var chatOpen = false;
        var unreadCount = 0;
        var cooldownTimer = null;
        var socket = null;

        // ── Auto-save state ──────────────────────────────────────────────────
        var AUTO_SAVE_INTERVAL_MS = 300000; // 5 minutes
        var SESSION_CHECK_INTERVAL_MS = 60000; // 1 minute
        var _autoSaveTimer = null;
        var _sessionCheckTimer = null;
        var _sessionKicked = false;

        function _showKickedModal() {
            if (_sessionKicked) return;
            _sessionKicked = true;
            if (_autoSaveTimer) clearInterval(_autoSaveTimer);
            if (_sessionCheckTimer) clearInterval(_sessionCheckTimer);
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = '<div style="background:#0d1f0d;border:1px solid rgba(180,130,255,0.4);border-radius:12px;padding:32px 40px;max-width:380px;text-align:center;color:#e8e0d0;">'
                + '<div style="font-size:22px;color:#c084fc;margin-bottom:12px;">Session Ended</div>'
                + '<div style="font-size:14px;color:#a0926a;margin-bottom:16px;">Your account was logged in from another location. Your progress has been saved.</div>'
                + '<div style="font-size:12px;color:#6b7280;">Returning to home...</div>'
                + '</div>';
            document.body.appendChild(overlay);
            // Log out server-side then redirect home.
            fetch('/api/online/logout', { method: 'POST' })
                .catch(function() {})
                .finally(function() {
                    setTimeout(function() { window.location.href = '/'; }, 2000);
                });
        }

        function _finalSaveThenKick() {
            if (_sessionKicked) return;
            _sessionKicked = true; // block any further checks while save is in flight
            // Attempt one last save before logging out and redirecting.
            fetch('/api/online/autosave', { method: 'POST' })
                .catch(function() {})
                .finally(function() {
                    _sessionKicked = false; // let _showKickedModal run its own guard
                    _showKickedModal();
                });
        }

        function checkSession() {
            if (!CURRENT_USER || _sessionKicked) return;
            fetch('/api/session/check').then(function(res) { return res.json(); }).then(function(data) {
                if (data && data.valid === false) { _finalSaveThenKick(); }
            }).catch(function() {});
        }

        function autoSaveCloud() {
            if (!CURRENT_USER || _sessionKicked) return;
            fetch('/api/online/autosave', { method: 'POST' }).then(function(res) {
                return res.json();
            }).then(function(data) {
                if (data && data.session_expired) {
                    // Server already did the grace save (or session is fully gone). Show kicked modal.
                    _showKickedModal();
                    return;
                }
                if (data && data.ok) {
                    var el = document.getElementById('autosave-indicator');
                    if (!el) return;
                    el.textContent = '✦ Auto-saved';
                    el.style.display = 'block';
                    setTimeout(function() { el.style.display = 'none'; }, 2500);
                }
            }).catch(function() {});
        }

        function startAutoSave() {
            if (_autoSaveTimer) clearInterval(_autoSaveTimer);
            if (_sessionCheckTimer) clearInterval(_sessionCheckTimer);
            _autoSaveTimer = setInterval(autoSaveCloud, AUTO_SAVE_INTERVAL_MS);
            _sessionCheckTimer = setInterval(checkSession, SESSION_CHECK_INTERVAL_MS);
        }

        // ── Trade state ───────────────────────────────────────────────────────
        var _tradeId = null;
        var _tradeOther = null;
        var _myConfirmed = false;
        var _theirConfirmed = false;
        var _myCurrentOffer = {items: [], gold: 0};
        var _pendingTradeInvite = null;

        function initChat() {
            socket = io({ transports: ['polling', 'websocket'] });

            // ── Trade socket events ───────────────────────────────────────
            socket.on('trade_invite', function(data) {
                _pendingTradeInvite = data;
                if (typeof showToast === 'function') {
                    showToast('⇄ ' + data.from + ' wants to trade! Click to respond.', 'var(--gold)', 10000);
                }
                showTradeInviteBar(data.from, data.trade_id);
            });

            socket.on('trade_invite_sent', function(data) {
                _tradeId = data.trade_id;
                if (typeof showToast === 'function') showToast('Trade request sent to ' + data.to + '...', 'var(--text-dim)', 5000);
            });

            socket.on('trade_update', function(data) {
                _tradeId = data.trade_id;
                _tradeOther = data.other;
                _myConfirmed = data.my_confirmed;
                _theirConfirmed = data.their_confirmed;
                _myCurrentOffer = data.my_offer;
                renderTradePanel(data);
            });

            socket.on('trade_approved', function(data) {
                _tradeId = null;
                closeTradePanel();
                applyTradeResult(data);
            });

            socket.on('trade_cancelled', function(data) {
                _tradeId = null;
                _tradeOther = null;
                closeTradePanel();
                hideTradeInviteBar();
                if (typeof showToast === 'function') showToast(data.message || 'Trade cancelled.', 'var(--red)', 4000);
            });

            socket.on('trade_error', function(data) {
                var el = document.getElementById('trade-error-label');
                if (el) { el.textContent = data.message || 'Trade error.'; setTimeout(function() { if (el) el.textContent = ''; }, 4000); }
                if (typeof showToast === 'function') showToast(data.message || 'Trade error.', 'var(--red)', 4000);
            });

            socket.on('disconnect', function() {});
        }

        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        window.toggleChat = function() {
            chatOpen = !chatOpen;
            var panel = document.getElementById('chat-panel');
            panel.style.display = chatOpen ? 'flex' : 'none';
            panel.style.flexDirection = 'column';
            if (chatOpen) {
                unreadCount = 0;
                var badge = document.getElementById('chat-badge');
                badge.style.display = 'none';
                badge.textContent = '';
                var frame = document.getElementById('chat-widget-frame');
                if (frame && !frame.src) {
                    frame.src = '/chat_widget';
                }
            }
        };

        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'chat_unread' && !chatOpen) {
                unreadCount++;
                var badge = document.getElementById('chat-badge');
                badge.style.display = 'flex';
                badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
            }
        });

        window.openGroupsOverlay = function() {
            var overlay = document.getElementById('groups-overlay');
            var frame = document.getElementById('groups-overlay-frame');
            if (!overlay || !frame) return;
            if (!frame.src || frame.src === window.location.href) {
                frame.src = '/groups';
            }
            overlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        window.closeGroupsOverlay = function() {
            var overlay = document.getElementById('groups-overlay');
            if (!overlay) return;
            overlay.style.display = 'none';
            document.body.style.overflow = '';
        };

        // ── Trade functions ───────────────────────────────────────
        function tradeSendRequest(targetUser) {
            if (!socket) return;
            if (_tradeId) { if (typeof showToast === 'function') showToast('You already have an active trade.', 'var(--red)', 3000); return; }
            socket.emit('trade_request', { target: targetUser });
        }

        function showTradeInviteBar(fromUser, tradeId) {
            var existing = document.getElementById('trade-invite-bar');
            if (existing) existing.remove();
            var bar = document.createElement('div');
            bar.id = 'trade-invite-bar';
            bar.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9600;background:var(--bg-panel);border:2px solid var(--gold-dim);padding:10px 18px;display:flex;align-items:center;gap:14px;box-shadow:3px 3px 0 rgba(0,0,0,0.5);min-width:260px;max-width:90vw;font-family:Tiny5,monospace;';
            bar.innerHTML = '<span style="font-size:13px;color:var(--gold);">&#8644; <b>' + escHtml(fromUser) + '</b> wants to trade with you!</span>' +
                '<button onclick="tradeAcceptInvite(\'' + tradeId + '\')" style="padding:5px 12px;background:var(--green);border:1px solid var(--green-bright);color:var(--gold-bright);font-size:12px;cursor:pointer;white-space:nowrap;font-family:Tiny5,monospace;">Accept</button>' +
                '<button onclick="tradeDeclineInvite(\'' + tradeId + '\')" style="padding:5px 12px;background:var(--red-dark);border:1px solid var(--red);color:#f8c0a0;font-size:12px;cursor:pointer;white-space:nowrap;font-family:Tiny5,monospace;">Decline</button>';
            document.body.appendChild(bar);
            setTimeout(function() { if (document.getElementById('trade-invite-bar') === bar) bar.remove(); }, 20000);
        }

        function hideTradeInviteBar() {
            var bar = document.getElementById('trade-invite-bar');
            if (bar) bar.remove();
        }

        window.tradeAcceptInvite = function(tradeId) {
            hideTradeInviteBar();
            if (!socket) return;
            socket.emit('trade_accept', { trade_id: tradeId });
        };

        window.tradeDeclineInvite = function(tradeId) {
            hideTradeInviteBar();
            _pendingTradeInvite = null;
            if (!socket) return;
            socket.emit('trade_decline', { trade_id: tradeId });
        };

        function openTradePanel() {
            var overlay = document.getElementById('trade-overlay');
            if (overlay) { overlay.style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        }

        function closeTradePanel() {
            var overlay = document.getElementById('trade-overlay');
            if (overlay) overlay.style.display = 'none';
            document.body.style.overflow = '';
            _tradeId = null; _tradeOther = null; _myConfirmed = false; _theirConfirmed = false; _myCurrentOffer = {items:[], gold:0};
            var gi = document.getElementById('trade-gold-input');
            if (gi) gi.value = '';
        }

        window.tradeCancel = function() {
            if (!socket || !_tradeId) { closeTradePanel(); return; }
            socket.emit('trade_cancel', { trade_id: _tradeId });
        };

        function renderTradePanel(data) {
            openTradePanel();
            var titleEl = document.getElementById('trade-title');
            if (titleEl) titleEl.textContent = '⇄ Trade with ' + (data.other || '');

            var myItemsEl = document.getElementById('trade-my-items');
            if (myItemsEl) {
                myItemsEl.innerHTML = '';
                (data.my_offer.items || []).forEach(function(item) {
                    var row = document.createElement('div');
                    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--bg-panel-dark);border:1px solid var(--border);font-size:12px;color:var(--text-light);font-family:Tiny5,monospace;';
                    row.innerHTML = '<span>' + escHtml(item) + '</span>' + (!data.my_confirmed ? '<button onclick="tradeRemoveItem(\'' + item.replace(/'/g, "\\'") + '\')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;">×</button>' : '');
                    myItemsEl.appendChild(row);
                });
                if (!(data.my_offer.items || []).length) {
                    myItemsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-style:italic;padding:4px;">No items offered</div>';
                }
            }

            var myGoldLabel = document.getElementById('trade-my-gold-label');
            if (myGoldLabel) myGoldLabel.textContent = 'Offering: ' + (data.my_offer.gold || 0).toLocaleString() + ' gold';
            var gi = document.getElementById('trade-gold-input');
            if (gi && !gi.matches(':focus')) gi.value = data.my_offer.gold || 0;

            var theirItemsEl = document.getElementById('trade-their-items');
            if (theirItemsEl) {
                theirItemsEl.innerHTML = '';
                (data.their_offer.items || []).forEach(function(item) {
                    var row = document.createElement('div');
                    row.style.cssText = 'display:flex;align-items:center;padding:4px 8px;background:var(--bg-panel-dark);border:1px solid var(--border);font-size:12px;color:var(--text-light);font-family:Tiny5,monospace;';
                    row.textContent = item;
                    theirItemsEl.appendChild(row);
                });
                if (!(data.their_offer.items || []).length) {
                    theirItemsEl.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-style:italic;padding:4px;">No items offered</div>';
                }
            }

            var theirGoldEl = document.getElementById('trade-their-gold');
            if (theirGoldEl) {
                var tg = data.their_offer.gold || 0;
                theirGoldEl.textContent = tg > 0 ? 'Offering: ' + tg.toLocaleString() + ' gold' : '';
            }

            var theirConfirmLabel = document.getElementById('trade-their-confirm-label');
            if (theirConfirmLabel) theirConfirmLabel.textContent = data.their_confirmed ? '✔ ' + (data.other || 'They') + ' confirmed' : '';

            var confirmBtn = document.getElementById('trade-confirm-btn');
            if (confirmBtn) {
                if (data.my_confirmed) {
                    confirmBtn.textContent = 'Unconfirm';
                    confirmBtn.style.background = 'linear-gradient(135deg,rgba(120,80,30,0.7),rgba(80,50,20,0.7))';
                    confirmBtn.style.borderColor = 'var(--gold)';
                    confirmBtn.style.color = 'var(--gold)';
                } else {
                    confirmBtn.textContent = 'Confirm Trade';
                    confirmBtn.style.background = 'linear-gradient(135deg,rgba(80,150,50,0.7),rgba(40,100,30,0.7))';
                    confirmBtn.style.borderColor = 'var(--green-bright)';
                    confirmBtn.style.color = 'var(--green-bright)';
                }
            }

            var addBtn = document.getElementById('trade-add-item-btn');
            if (addBtn) addBtn.style.display = data.my_confirmed ? 'none' : '';
            var gi2 = document.getElementById('trade-gold-input');
            if (gi2) gi2.disabled = data.my_confirmed;
        }

        window.tradeToggleConfirm = function() {
            if (!socket || !_tradeId) return;
            socket.emit('trade_confirm', { trade_id: _tradeId, confirmed: !_myConfirmed });
        };

        window.tradeRemoveItem = function(itemName) {
            if (!socket || !_tradeId) return;
            socket.emit('trade_remove_item', { trade_id: _tradeId, item_name: itemName });
        };

        window.tradeSetGold = function(val) {
            if (!socket || !_tradeId) return;
            var amount = parseInt(val, 10) || 0;
            socket.emit('trade_set_gold', { trade_id: _tradeId, gold: amount });
        };

        window.tradeOpenItemPicker = function() {
            var picker = document.getElementById('trade-item-picker');
            if (!picker) return;
            fetch('/api/player/inventory').then(function(r) { return r.json(); }).then(function(data) {
                var alreadyOffered = (_myCurrentOffer && _myCurrentOffer.items) ? _myCurrentOffer.items.slice() : [];
                var inv = (data.inventory || []).slice();
                alreadyOffered.forEach(function(item) { var idx = inv.indexOf(item); if (idx !== -1) inv.splice(idx, 1); });
                var counts = {};
                inv.forEach(function(item) { counts[item] = (counts[item] || 0) + 1; });
                var unique = Object.keys(counts);
                var listEl = document.getElementById('trade-item-list');
                if (!listEl) return;
                listEl.innerHTML = '';
                if (!unique.length) {
                    listEl.innerHTML = '<div style="font-size:12px;color:var(--text-dim);padding:8px;">No items available to offer.</div>';
                } else {
                    unique.forEach(function(item) {
                        var row = document.createElement('button');
                        row.style.cssText = 'width:100%;text-align:left;padding:7px 10px;background:var(--bg-panel-dark);border:1px solid var(--border);color:var(--text-light);font-size:12px;cursor:pointer;margin:0;font-family:Tiny5,monospace;';
                        row.textContent = item + (counts[item] > 1 ? ' (x' + counts[item] + ')' : '');
                        row.setAttribute('data-item', item);
                        row.onmouseover = function() { this.style.background = 'var(--slate-dark)'; this.style.color = 'var(--gold)'; };
                        row.onmouseout = function() { this.style.background = 'var(--bg-panel-dark)'; this.style.color = 'var(--text-light)'; };
                        row.onclick = function() {
                            if (!socket || !_tradeId) return;
                            socket.emit('trade_add_item', { trade_id: _tradeId, item_name: item });
                            picker.style.display = 'none';
                        };
                        listEl.appendChild(row);
                    });
                }
                var search = document.getElementById('trade-item-search');
                if (search) { search.value = ''; }
                picker.style.display = 'flex';
            }).catch(function(e) {
                if (typeof showToast === 'function') showToast('Could not load inventory.', 'var(--red)', 3000);
            });
        };

        window.tradeFilterItems = function(query) {
            var listEl = document.getElementById('trade-item-list');
            if (!listEl) return;
            var q = query.toLowerCase();
            listEl.querySelectorAll('button[data-item]').forEach(function(btn) {
                btn.style.display = btn.getAttribute('data-item').toLowerCase().indexOf(q) !== -1 ? '' : 'none';
            });
        };

        async function applyTradeResult(data) {
            try {
                var res = await fetch('/api/trade/apply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ trade_id: data.trade_id })
                });
                var result = await res.json();
                if (result.ok) {
                    var msg = 'Trade complete!';
                    if (data.receive_items && data.receive_items.length) msg += ' Received: ' + data.receive_items.join(', ') + '.';
                    if (data.receive_gold > 0) msg += ' +' + data.receive_gold.toLocaleString() + ' gold.';
                    if (typeof showToast === 'function') showToast(msg, 'var(--green-bright)', 6000);
                    setTimeout(function() { window.location.reload(); }, 2000);
                } else {
                    if (typeof showToast === 'function') showToast('Trade apply failed: ' + result.message, 'var(--red)', 5000);
                }
            } catch(e) {
                if (typeof showToast === 'function') showToast('Trade error: ' + e.message, 'var(--red)', 5000);
            }
        }

        window.tradeSendRequest = tradeSendRequest;

        // ── Resize logic ──────────────────────────────────────────
        (function() {
            var panel, isResizingV, isResizingH, startY, startX, startH, startW;

            function setupResize() {
                panel = document.getElementById('chat-panel');
                var handleV = document.getElementById('chat-resize-handle');
                var handleH = document.getElementById('chat-resize-lr');
                if (!panel || !handleV || !handleH) return;

                handleV.addEventListener('mousedown', function(e) {
                    isResizingV = true;
                    startY = e.clientY;
                    startH = panel.offsetHeight;
                    e.preventDefault();
                });

                handleH.addEventListener('mousedown', function(e) {
                    isResizingH = true;
                    startX = e.clientX;
                    startW = panel.offsetWidth;
                    e.preventDefault();
                });

                document.addEventListener('mousemove', function(e) {
                    if (isResizingV) {
                        var dy = startY - e.clientY;
                        var newH = Math.max(220, Math.min(window.innerHeight - 100, startH + dy));
                        panel.style.height = newH + 'px';
                    }
                    if (isResizingH) {
                        var dx = startX - e.clientX;
                        var newW = Math.max(260, Math.min(700, startW + dx));
                        panel.style.width = newW + 'px';
                    }
                });

                document.addEventListener('mouseup', function() {
                    isResizingV = false;
                    isResizingH = false;
                });
            }

            document.addEventListener('DOMContentLoaded', setupResize);
        })();

        document.addEventListener('DOMContentLoaded', function() {
            initChat();
            startAutoSave();
            _startAfkWatcher();
        });
    })();
    </script>

    <!-- AFK watcher (online users only) -->
    <script>
    (function() {
        var AFK_WARN_MS  = 20 * 60 * 1000;   // 20 minutes
        var AFK_KICK_MS  = 30 * 60 * 1000;   // 30 minutes
        var CHECK_INTERVAL_MS = 10000;         // check every 10 s
        var _lastActivity = Date.now();
        var _warnShown    = false;
        var _kicked       = false;
        var _warnOverlay  = null;
        var _countdownInterval = null;
        var _checkTimer   = null;

        function _resetActivity() {
            _lastActivity = Date.now();
            if (_warnShown) _dismissAfkWarning();
        }

        function _dismissAfkWarning() {
            _warnShown = false;
            if (_countdownInterval) { clearInterval(_countdownInterval); _countdownInterval = null; }
            if (_warnOverlay && _warnOverlay.parentNode) {
                _warnOverlay.parentNode.removeChild(_warnOverlay);
                _warnOverlay = null;
            }
        }

        function _showAfkWarning(remainingMs) {
            if (_warnShown || _kicked) return;
            _warnShown = true;

            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:199999;display:flex;align-items:center;justify-content:center;';
            var remaining = Math.ceil(remainingMs / 1000);
            overlay.innerHTML =
                '<div style="background:linear-gradient(160deg,rgba(20,12,40,0.99),rgba(10,6,24,0.99));border:1px solid rgba(180,130,255,0.45);border-radius:12px;padding:32px 40px;max-width:380px;text-align:center;color:#e8e0d0;">'
                + '<div style="font-size:26px;margin-bottom:10px;">&#128564;</div>'
                + '<div style="font-size:18px;color:#c084fc;font-weight:600;margin-bottom:10px;">Are you still there?</div>'
                + '<div style="font-size:13px;color:#a0926a;margin-bottom:6px;">You have been idle for 20 minutes.</div>'
                + '<div style="font-size:13px;color:#a0926a;margin-bottom:20px;">You will be logged out in <span id="afk-countdown" style="color:#f87171;font-weight:700;">' + remaining + '</span> second(s).</div>'
                + '<button id="afk-still-here-btn" style="background:linear-gradient(135deg,rgba(80,50,150,0.85),rgba(50,30,100,0.85));border:1px solid rgba(180,130,255,0.5);color:#c084fc;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">I\'m still here</button>'
                + '</div>';

            document.body.appendChild(overlay);
            _warnOverlay = overlay;

            overlay.querySelector('#afk-still-here-btn').addEventListener('click', function() {
                _resetActivity();
            });

            _countdownInterval = setInterval(function() {
                remaining--;
                var el = document.getElementById('afk-countdown');
                if (el) el.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(_countdownInterval);
                    _countdownInterval = null;
                }
            }, 1000);
        }

        function _afkKick() {
            if (_kicked) return;
            _kicked = true;
            _dismissAfkWarning();
            if (_checkTimer) { clearInterval(_checkTimer); _checkTimer = null; }

            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:199999;display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML =
                '<div style="background:linear-gradient(160deg,rgba(20,12,40,0.99),rgba(10,6,24,0.99));border:1px solid rgba(180,130,255,0.45);border-radius:12px;padding:32px 40px;max-width:380px;text-align:center;color:#e8e0d0;">'
                + '<div style="font-size:26px;margin-bottom:10px;">&#128564;</div>'
                + '<div style="font-size:18px;color:#c084fc;font-weight:600;margin-bottom:12px;">Logged out due to inactivity</div>'
                + '<div style="font-size:13px;color:#a0926a;margin-bottom:20px;">You were idle for 30 minutes. Your progress has been saved.</div>'
                + '<div style="font-size:12px;color:#6b7280;">Redirecting to home...</div>'
                + '</div>';
            document.body.appendChild(overlay);

            fetch('/api/online/autosave', { method: 'POST' })
                .catch(function() {})
                .finally(function() {
                    fetch('/api/online/logout', { method: 'POST' })
                        .catch(function() {})
                        .finally(function() {
                            setTimeout(function() { window.location.href = '/'; }, 2000);
                        });
                });
        }

        function _checkAfk() {
            if (_kicked) return;
            var idle = Date.now() - _lastActivity;
            if (idle >= AFK_KICK_MS) {
                _afkKick();
            } else if (idle >= AFK_WARN_MS && !_warnShown) {
                _showAfkWarning(AFK_KICK_MS - idle);
            } else if (_warnShown) {
                var remaining = Math.ceil((AFK_KICK_MS - idle) / 1000);
                var el = document.getElementById('afk-countdown');
                if (el) el.textContent = remaining;
            }
        }

        window._startAfkWatcher = function() {
            ['mousemove', 'mousedown', 'keydown', 'touchstart', 'scroll', 'click'].forEach(function(evt) {
                document.addEventListener(evt, _resetActivity, { passive: true });
            });
            _checkTimer = setInterval(_checkAfk, CHECK_INTERVAL_MS);
        };
    })();
    </script>
    <script>
    (function() {
        // If the game page provides an inline global chat tab, hide the floating chat widget
        document.addEventListener('DOMContentLoaded', function() {
            try {
                if (document.getElementById('tab-global-chat') || document.querySelector('.game-layout')) {
                    var cw = document.getElementById('chat-widget');
                    if (cw) cw.style.display = 'none';
                    document.querySelectorAll('.widget-fab').forEach(function(b) { b.style.display = 'none'; });
                }
            } catch (e) { /* no-op */ }
        });
    })();
    </script>
    {% endif %}
