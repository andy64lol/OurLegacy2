<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Legacy 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Background music (loops; volume controlled by user) -->
    <audio id="bg-music" loop preload="auto" style="display:none;">
        <source src="/game_assets/main_theme.mp3" type="audio/mpeg">
    </audio>

    {% block content %}{% endblock %}
    <script src="/static/js/game.js"></script>
    <script src="/static/js/translate.js"></script>
    <script src="//translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
