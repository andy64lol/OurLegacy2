<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends — Our Legacy 2</title>
    <link rel="icon" href="/game_assets/game_title_our_legacy_2.png" type="image/png">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg-dark, #0a0614); color: var(--text-light, #e0d8f0); font-family: 'Segoe UI', sans-serif; }

        #friends-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 960px;
            margin: 0 auto;
            border-left: 1px solid rgba(180,130,255,0.15);
            border-right: 1px solid rgba(180,130,255,0.15);
            background: linear-gradient(160deg, rgba(14,10,30,0.98), rgba(8,5,20,0.98));
        }

        #friends-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(60,30,100,0.55);
            border-bottom: 1px solid rgba(180,130,255,0.25);
            flex-shrink: 0;
        }
        #friends-header .title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--mana-bright, #c084fc);
            letter-spacing: 0.06em;
        }
        .hdr-links { display: flex; gap: 8px; }
        .hdr-links a {
            font-size: 13px;
            color: var(--text-dim, #8878aa);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid rgba(180,130,255,0.25);
            border-radius: 6px;
            transition: color 0.15s, border-color 0.15s;
        }
        .hdr-links a:hover { color: var(--mana-bright); border-color: rgba(180,130,255,0.5); }

        #friends-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left sidebar (friends list + requests + add) ── */
        #friends-sidebar {
            width: 240px;
            flex-shrink: 0;
            border-right: 1px solid rgba(180,130,255,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #add-friend-bar {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(180,130,255,0.12);
            flex-shrink: 0;
        }
        #add-friend-bar input {
            width: 100%;
            padding: 7px 10px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(180,130,255,0.35);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 13px;
            margin-bottom: 6px;
        }
        #add-friend-bar input:focus { outline: none; border-color: rgba(180,130,255,0.65); }
        #add-friend-btn {
            width: 100%;
            padding: 7px;
            background: linear-gradient(135deg, rgba(80,50,150,0.85), rgba(50,30,100,0.85));
            border: 1px solid var(--mana-bright);
            border-radius: 6px;
            color: var(--mana-bright);
            font-size: 13px;
            cursor: pointer;
        }
        #add-friend-btn:hover { opacity: 0.85; }
        #add-friend-msg { font-size: 11px; margin-top: 5px; min-height: 14px; }

        #sidebar-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }

        .sidebar-section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            padding: 8px 14px 4px;
        }

        .friend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            cursor: pointer;
            border-radius: 0;
            transition: background 0.12s;
            position: relative;
        }
        .friend-row:hover { background: rgba(180,130,255,0.08); }
        .friend-row.active { background: rgba(180,130,255,0.15); }

        .friend-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(80,50,150,0.7), rgba(40,20,80,0.7));
            border: 1px solid rgba(180,130,255,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--mana-bright);
            flex-shrink: 0;
            text-transform: uppercase;
        }
        .friend-name { flex: 1; font-size: 13px; color: var(--text-light); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .online-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--green-bright, #4ade80);
            flex-shrink: 0;
        }
        .offline-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }
        .unread-badge {
            background: var(--red, #f87171);
            color: white;
            font-size: 10px;
            font-weight: 700;
            border-radius: 10px;
            padding: 1px 6px;
            flex-shrink: 0;
        }

        .request-row {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(180,130,255,0.08);
        }
        .request-name { font-size: 13px; color: var(--gold, #f6c90e); margin-bottom: 5px; }
        .request-btns { display: flex; gap: 5px; }
        .btn-accept { padding: 3px 10px; background: rgba(30,100,60,0.6); border: 1px solid var(--green-bright, #4ade80); border-radius: 4px; color: var(--green-bright); font-size: 11px; cursor: pointer; }
        .btn-accept:hover { background: rgba(30,100,60,0.85); }
        .btn-decline { padding: 3px 10px; background: rgba(100,30,30,0.4); border: 1px solid rgba(200,80,80,0.4); border-radius: 4px; color: var(--red, #f87171); font-size: 11px; cursor: pointer; }
        .btn-decline:hover { background: rgba(120,30,30,0.7); }

        .outgoing-row {
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .outgoing-name { font-size: 12px; color: var(--text-dim); flex: 1; }
        .outgoing-label { font-size: 10px; color: var(--text-dim); opacity: 0.6; font-style: italic; }

        /* ── Right DM panel ── */
        #dm-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #dm-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            color: var(--text-dim);
            font-size: 14px;
        }
        #dm-empty .big-icon { font-size: 48px; opacity: 0.3; }

        #dm-header {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(180,130,255,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(40,20,70,0.4);
        }
        #dm-with-name { font-size: 15px; font-weight: 700; color: var(--mana-bright); }
        #dm-remove-btn {
            font-size: 11px;
            color: var(--red);
            background: none;
            border: 1px solid rgba(200,80,80,0.3);
            border-radius: 5px;
            padding: 3px 10px;
            cursor: pointer;
            opacity: 0.7;
        }
        #dm-remove-btn:hover { opacity: 1; }
        #dm-block-btn {
            font-size: 11px;
            color: #f97316;
            background: none;
            border: 1px solid rgba(249,115,22,0.3);
            border-radius: 5px;
            padding: 3px 10px;
            cursor: pointer;
            opacity: 0.7;
        }
        #dm-block-btn:hover { opacity: 1; }
        .blocked-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
        }
        .blocked-name { flex: 1; font-size: 12px; color: var(--text-dim); text-decoration: line-through; opacity: 0.7; }
        .btn-unblock { padding: 2px 8px; background: rgba(100,60,20,0.4); border: 1px solid rgba(249,115,22,0.4); border-radius: 4px; color: #f97316; font-size: 11px; cursor: pointer; }
        .btn-unblock:hover { background: rgba(130,80,20,0.6); }

        #dm-messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #dm-input-bar {
            padding: 12px 18px;
            border-top: 1px solid rgba(180,130,255,0.15);
            background: rgba(20,10,40,0.6);
            flex-shrink: 0;
        }
        #dm-input-row { display: flex; gap: 8px; align-items: center; }
        #dm-input {
            flex: 1;
            padding: 9px 13px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(180,130,255,0.35);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 14px;
            outline: none;
        }
        #dm-input:focus { border-color: rgba(180,130,255,0.65); }
        #dm-send-btn {
            padding: 9px 18px;
            background: linear-gradient(135deg, rgba(80,50,150,0.85), rgba(50,30,100,0.85));
            border: 1px solid var(--mana-bright);
            border-radius: 8px;
            color: var(--mana-bright);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        #dm-send-btn:hover { opacity: 0.85; }
        #dm-error { font-size: 12px; color: var(--red); min-height: 14px; margin-top: 4px; }

        /* toast notifications */
        #friends-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast-item {
            background: linear-gradient(135deg, rgba(60,30,100,0.95), rgba(30,15,60,0.95));
            border: 1px solid rgba(180,130,255,0.5);
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-light);
            box-shadow: 0 4px 18px rgba(80,40,160,0.4);
            animation: toastIn 0.25s ease;
            max-width: 300px;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #friends-sidebar { width: 180px; }
        }
    </style>
</head>
<body>
<div id="friends-page">

    <div id="friends-header">
        <div class="title">
            &#10024; Friends
        </div>
        <div class="hdr-links">
            <a href="/chat">&#128172; Chat</a>
            <a href="/game">&#8592; Game</a>
        </div>
    </div>

    <div id="friends-body">

        <!-- ── Sidebar ── -->
        <div id="friends-sidebar">
            <div id="add-friend-bar">
                <input type="text" id="add-friend-input" placeholder="Add by username..." maxlength="20"
                    onkeydown="if(event.key==='Enter')addFriend()">
                <button id="add-friend-btn" onclick="addFriend()">+ Send Request</button>
                <div id="add-friend-msg"></div>
            </div>
            <div id="sidebar-scroll">
                <div id="sidebar-content">
                    <div style="padding:20px 14px;font-size:12px;color:var(--text-dim);">Loading...</div>
                </div>
            </div>
        </div>

        <!-- ── DM Panel ── -->
        <div id="dm-panel">
            <div id="dm-empty">
                <div class="big-icon">&#10024;</div>
                <div>Select a friend to chat privately</div>
            </div>

            <div id="dm-conversation" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
                <div id="dm-header">
                    <div id="dm-with-name"></div>
                    <div style="display:flex;gap:6px;">
                        <button id="dm-block-btn" onclick="blockUser()">&#128683; Block</button>
                        <button id="dm-remove-btn" onclick="removeFriend()">Remove</button>
                    </div>
                </div>
                <div id="dm-messages"></div>
                <div id="dm-input-bar">
                    <div id="dm-input-row">
                        <input type="text" id="dm-input" placeholder="Send a private message..." maxlength="500"
                            onkeydown="if(event.key==='Enter')dmSend()">
                        <button id="dm-send-btn" onclick="dmSend()">Send</button>
                    </div>
                    <div id="dm-error"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="friends-toast"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
#fc-overlay{position:fixed;inset:0;width:100%;height:100%;background:rgba(0,0,0,0.82);z-index:10000;display:none;align-items:center;justify-content:center;overflow:hidden;}
#fc-box{background:linear-gradient(160deg,rgba(20,12,40,0.99),rgba(10,6,24,0.99));border:1px solid rgba(180,130,255,0.45);border-radius:12px;padding:28px 28px 22px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(60,20,120,0.55);text-align:center;}
</style>
<div id="fc-overlay"><div id="fc-box">
<div style="font-size:28px;margin-bottom:12px;">&#9888;&#65039;</div>
<div id="fc-msg" style="font-size:14px;color:#e0d8f0;margin-bottom:22px;line-height:1.6;"></div>
<div style="display:flex;gap:10px;justify-content:center;">
<button id="fc-ok" style="min-width:100px;padding:8px 16px;background:rgba(160,30,30,0.7);border:1px solid #f87171;border-radius:6px;color:#f87171;cursor:pointer;">Confirm</button>
<button id="fc-cancel" style="min-width:100px;padding:8px 16px;background:rgba(40,20,70,0.7);border:1px solid rgba(180,130,255,0.4);border-radius:6px;color:#e0d8f0;cursor:pointer;">Cancel</button>
</div></div></div>

<script>
function friendsPageConfirm(msg, onOk) {
    var ov=document.getElementById('fc-overlay'), m=document.getElementById('fc-msg'),
        ok=document.getElementById('fc-ok'), cl=document.getElementById('fc-cancel');
    m.textContent=msg; ov.style.display='flex'; document.body.style.overflow='hidden';
    function close(){ov.style.display='none';document.body.style.overflow='';ok.removeEventListener('click',doOk);cl.removeEventListener('click',doClose);}
    function doOk(){close();if(onOk)onOk();}
    function doClose(){close();}
    ok.addEventListener('click',doOk); cl.addEventListener('click',doClose);
}
(function() {
    var ME = {{ online_username | tojson }};
    var socket = null;
    var currentDmWith = null;
    var friendsData = { friends: [], incoming: [], outgoing: [] };
    var blockedUsers = [];

    // ── Socket ──────────────────────────────────────────────────
    function initSocket() {
        socket = io({ transports: ['polling', 'websocket'] });

        socket.on('friend_request', function(data) {
            showToast('&#10024; Friend request from <strong>' + esc(data.from) + '</strong>');
            loadFriends();
        });

        socket.on('friend_accepted', function(data) {
            showToast('&#10024; <strong>' + esc(data.from) + '</strong> accepted your friend request!');
            loadFriends();
        });

        socket.on('dm_message', function(msg) {
            if (currentDmWith === msg.sender) {
                appendDmMsg(msg, true);
                fetch('/api/dm/' + encodeURIComponent(msg.sender));
            } else {
                showToast('&#128172; New message from <strong>' + esc(msg.sender) + '</strong>');
                loadFriends();
            }
        });

        socket.on('online_users', function() {
            loadFriends();
        });
    }

    // ── Load friends + blocked list ──────────────────────────────
    function loadFriends() {
        Promise.all([
            fetch('/api/friends').then(function(r) { return r.json(); }),
            fetch('/api/block/list').then(function(r) { return r.json(); })
        ]).then(function(results) {
            friendsData = results[0];
            blockedUsers = results[1].blocked || [];
            renderSidebar(friendsData);
        });
    }

    function renderSidebar(data) {
        var html = '';

        // Incoming requests
        if (data.incoming && data.incoming.length) {
            html += '<div class="sidebar-section-label">&#128228; Requests (' + data.incoming.length + ')</div>';
            data.incoming.forEach(function(req) {
                html += '<div class="request-row">' +
                    '<div class="request-name">&#10024; ' + esc(req.username) + '</div>' +
                    '<div class="request-btns">' +
                    '<button class="btn-accept" onclick="respondRequest(\'' + req.id + '\',true)">Accept</button>' +
                    '<button class="btn-decline" onclick="respondRequest(\'' + req.id + '\',false)">Decline</button>' +
                    '</div></div>';
            });
        }

        // Friends
        html += '<div class="sidebar-section-label">Friends (' + (data.friends ? data.friends.length : 0) + ')</div>';
        if (!data.friends || !data.friends.length) {
            html += '<div style="padding:8px 14px;font-size:12px;color:var(--text-dim);">No friends yet. Send a request above!</div>';
        } else {
            data.friends.forEach(function(f) {
                var isActive = (f.username === currentDmWith);
                html += '<div class="friend-row' + (isActive ? ' active' : '') + '" onclick="openDm(\'' + esc(f.username) + '\')">' +
                    '<div class="friend-avatar">' + esc(f.username.charAt(0)) + '</div>' +
                    '<span class="friend-name">' + esc(f.username) + '</span>' +
                    (f.unread ? '<span class="unread-badge">' + f.unread + '</span>' : '') +
                    (f.online ? '<span class="online-dot" title="Online"></span>' : '<span class="offline-dot" title="Offline"></span>') +
                    '</div>';
            });
        }

        // Outgoing requests
        if (data.outgoing && data.outgoing.length) {
            html += '<div class="sidebar-section-label">Sent Requests</div>';
            data.outgoing.forEach(function(req) {
                html += '<div class="outgoing-row">' +
                    '<span class="outgoing-name">' + esc(req.username) + '</span>' +
                    '<span class="outgoing-label">pending...</span>' +
                    '</div>';
            });
        }

        // Blocked users
        if (blockedUsers && blockedUsers.length) {
            html += '<div class="sidebar-section-label" style="color:#f97316;opacity:0.7;">&#128683; Blocked (' + blockedUsers.length + ')</div>';
            blockedUsers.forEach(function(u) {
                html += '<div class="blocked-row">' +
                    '<span class="blocked-name">' + esc(u) + '</span>' +
                    '<button class="btn-unblock" onclick="doUnblock(\'' + esc(u) + '\')">Unblock</button>' +
                    '</div>';
            });
        }

        document.getElementById('sidebar-content').innerHTML = html;
    }

    // ── Add friend ────────────────────────────────────────────────
    window.addFriend = function() {
        var inp = document.getElementById('add-friend-input');
        var msgEl = document.getElementById('add-friend-msg');
        var target = (inp.value || '').trim().toLowerCase();
        if (!target) return;
        msgEl.textContent = '';
        fetch('/api/friends/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: target })
        }).then(function(r) { return r.json(); }).then(function(d) {
            msgEl.style.color = d.ok ? 'var(--green-bright)' : 'var(--red)';
            msgEl.textContent = d.message || '';
            if (d.ok) { inp.value = ''; loadFriends(); }
            setTimeout(function() { msgEl.textContent = ''; }, 4000);
        });
    };

    // ── Respond to request ────────────────────────────────────────
    window.respondRequest = function(id, accept) {
        fetch('/api/friends/respond', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id, accept: accept })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) {
                showToast(d.message);
                loadFriends();
            }
        });
    };

    // ── Remove friend ─────────────────────────────────────────────
    window.removeFriend = function() {
        if (!currentDmWith) return;
        var target = currentDmWith;
        friendsPageConfirm('Remove ' + target + ' as a friend?', function() {
            fetch('/api/friends/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target })
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) {
                    showToast(d.message);
                    currentDmWith = null;
                    document.getElementById('dm-empty').style.display = '';
                    document.getElementById('dm-conversation').style.display = 'none';
                    loadFriends();
                }
            });
        });
    };

    // ── Block user ────────────────────────────────────────────────
    window.blockUser = function() {
        if (!currentDmWith) return;
        var target = currentDmWith;
        friendsPageConfirm('Block ' + target + '? This will remove the friendship and prevent them from messaging or adding you.', function() {
            fetch('/api/block', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: target, action: 'block' })
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.ok) {
                    showToast('&#128683; ' + d.message);
                    currentDmWith = null;
                    document.getElementById('dm-empty').style.display = '';
                    document.getElementById('dm-conversation').style.display = 'none';
                    loadFriends();
                } else {
                    showToast(d.message || 'Failed to block user.');
                }
            });
        });
    };

    window.doUnblock = function(username) {
        fetch('/api/block', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target: username, action: 'unblock' })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) {
                showToast('&#9989; ' + d.message);
                loadFriends();
            }
        });
    };

    // ── Open DM ───────────────────────────────────────────────────
    window.openDm = function(username) {
        currentDmWith = username;
        document.getElementById('dm-with-name').textContent = username;
        document.getElementById('dm-empty').style.display = 'none';
        var conv = document.getElementById('dm-conversation');
        conv.style.display = 'flex';
        conv.style.flexDirection = 'column';
        conv.style.flex = '1';
        conv.style.overflow = 'hidden';
        document.getElementById('dm-messages').innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:20px;">Loading...</div>';
        document.getElementById('dm-error').textContent = '';
        loadFriends();
        fetch('/api/dm/' + encodeURIComponent(username))
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var box = document.getElementById('dm-messages');
                box.innerHTML = '';
                if (!d.messages || !d.messages.length) {
                    box.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-dim);padding:20px;">No messages yet. Say hello!</div>';
                    return;
                }
                d.messages.forEach(function(m) { appendDmMsg(m, false); });
                box.scrollTop = box.scrollHeight;
            });
        document.getElementById('dm-input').focus();
    };

    function appendDmMsg(msg, animate) {
        var box = document.getElementById('dm-messages');
        if (!box) return;
        var isMe = (msg.sender === ME);
        var div = document.createElement('div');
        div.style.cssText = 'display:flex;flex-direction:column;' + (isMe ? 'align-items:flex-end;' : 'align-items:flex-start;');
        var time = '';
        if (msg.created_at) {
            try { time = new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); } catch(e) {}
        }
        div.innerHTML = '<div style="max-width:420px;padding:7px 13px;border-radius:' +
            (isMe ? '12px 12px 3px 12px' : '12px 12px 12px 3px') +
            ';background:' + (isMe ? 'rgba(70,40,130,0.6)' : 'rgba(30,20,60,0.7)') +
            ';border:1px solid ' + (isMe ? 'rgba(160,100,255,0.4)' : 'rgba(100,80,180,0.3)') + ';word-break:break-word;">' +
            '<span style="font-size:11px;font-weight:700;color:' + (isMe ? 'var(--mana-bright)' : 'var(--gold)') + ';">' +
            esc(msg.sender) + '</span>' +
            '<div style="font-size:14px;color:var(--text-light);margin-top:3px;">' + esc(msg.message) + '</div>' +
            (time ? '<div style="font-size:10px;color:var(--text-dim);margin-top:3px;text-align:right;">' + time + '</div>' : '') +
            '</div>';
        if (animate) div.style.opacity = '0';
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
        if (animate) setTimeout(function() { div.style.transition = 'opacity 0.2s'; div.style.opacity = '1'; }, 10);
    }

    // ── Send DM ───────────────────────────────────────────────────
    window.dmSend = function() {
        if (!currentDmWith) return;
        var inp = document.getElementById('dm-input');
        var errEl = document.getElementById('dm-error');
        var msg = (inp.value || '').trim();
        if (!msg) return;
        errEl.textContent = '';
        fetch('/api/dm/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ recipient: currentDmWith, message: msg })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.ok) {
                inp.value = '';
                appendDmMsg({ sender: ME, recipient: currentDmWith, message: d.row && d.row.message ? d.row.message : msg, created_at: new Date().toISOString() }, true);
            } else {
                errEl.textContent = d.message || 'Failed to send.';
                setTimeout(function() { errEl.textContent = ''; }, 3000);
            }
        });
    };

    // ── Toast ─────────────────────────────────────────────────────
    function showToast(html) {
        var container = document.getElementById('friends-toast');
        var el = document.createElement('div');
        el.className = 'toast-item';
        el.innerHTML = html;
        container.appendChild(el);
        setTimeout(function() {
            el.style.transition = 'opacity 0.4s';
            el.style.opacity = '0';
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 400);
        }, 4000);
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.addEventListener('DOMContentLoaded', function() {
        initSocket();
        loadFriends();
        // Check for ?dm= in URL
        var params = new URLSearchParams(window.location.search);
        var dmTarget = params.get('dm');
        if (dmTarget) {
            setTimeout(function() { openDm(dmTarget.toLowerCase()); }, 400);
        }
    });
})();
</script>
</body>
</html>
