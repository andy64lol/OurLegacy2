<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Our Legacy 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg, #0e0e12);
            padding: 40px 20px;
        }
        .play-page {
            max-width: 640px;
            width: 100%;
            text-align: center;
        }
        .play-title-img {
            max-width: 380px;
            width: 100%;
            margin-bottom: 32px;
        }
        .play-heading {
            font-size: 22px;
            font-weight: 600;
            color: var(--gold, #c8a84b);
            margin-bottom: 10px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .play-sub {
            font-size: 14px;
            color: var(--text-dim, #888);
            margin-bottom: 36px;
        }
        .server-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 480px) {
            .server-grid { grid-template-columns: 1fr; }
        }
        .server-card {
            background: var(--panel-bg, #16161e);
            border: 1px solid var(--border, #2a2a3a);
            border-radius: 10px;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: border-color 0.2s, transform 0.15s;
        }
        .server-card:hover {
            border-color: var(--gold, #c8a84b);
            transform: translateY(-2px);
        }
        .server-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-light, #e0ddd8);
            letter-spacing: 0.04em;
        }
        .server-badge {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border, #2a2a3a);
            color: var(--text-dim, #888);
        }
        .server-badge.replit { border-color: #6e44ff; color: #6e44ff; }
        .server-badge.render { border-color: #46e3b7; color: #46e3b7; }
        .btn-play-server {
            display: inline-block;
            padding: 10px 28px;
            background: var(--gold, #c8a84b);
            color: #0e0e12;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            text-decoration: none;
            letter-spacing: 0.04em;
            transition: background 0.2s;
        }
        .btn-play-server:hover {
            background: #e0c060;
        }
        .back-link {
            display: inline-block;
            margin-top: 36px;
            font-size: 13px;
            color: var(--text-dim, #888);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text-light, #e0ddd8); }
    </style>
</head>
<body>
    <div class="play-page">
        <img src="/game_assets/game_title_main_menu.png" alt="Our Legacy 2" class="play-title-img">

        <div class="play-heading">Choose Your Server</div>
        <div class="play-sub">Pick any server below to begin your adventure. Your progress is saved per server.</div>

        <div class="server-grid">
            <div class="server-card">
                <div class="server-name">Replit 1</div>
                <div class="server-badge replit">Replit</div>
                <a href="https://our-legacy-2--andy64lolxd1.replit.app/" target="_blank" rel="noopener" class="btn-play-server">Play Now</a>
            </div>
            <div class="server-card">
                <div class="server-name">Render 1</div>
                <div class="server-badge render">Render</div>
                <a href="https://ourlegacy2.onrender.com/" target="_blank" rel="noopener" class="btn-play-server">Play Now</a>
            </div>
        </div>

        <a href="/" class="back-link">&#8592; Back to Main Menu</a>
    </div>
</body>
</html>
